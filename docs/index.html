  <h1>把书签提纯成每日信号。</h1>
  <p class="lead">Ampira 是本地优先的 Chrome 新标签页扩展。它读取用户选择的书签和公开资讯来源，在浏览器本机整理信息流、阅读队列、归档与可选 AI 摘要。</p>
  <p>Ampira 没有广告、分析、开发者后端或账号系统。</p>
