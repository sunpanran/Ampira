  <h1>將書籤提煉成每日訊號。</h1>
  <p class="lead">Ampira 是支援 Chrome 與 Microsoft Edge 的本機優先新分頁擴充功能。它讀取使用者選擇的書籤與公開資訊來源，在瀏覽器本機整理資訊流、閱讀佇列、封存與選用的 AI 摘要。</p>
  <p>Ampira 沒有廣告、分析、開發者後端或帳號系統。</p>
