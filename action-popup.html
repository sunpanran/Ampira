<!doctype html>
<html lang="zh-CN" data-color-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ampira · 稍后读</title>
  <link rel="stylesheet" href="assets/styles/tokens.css">
  <link rel="stylesheet" href="assets/styles/action-popup.css">
</head>
<body>
  <main class="action-popup" data-state="loading">
    <header class="popup-header">
      <div class="popup-brand">
        <img src="assets/logo-purple.svg" alt="" width="24" height="24">
        <div>
          <strong>AMPIRA</strong>
          <span id="popupKicker">稍后读</span>
        </div>
      </div>
    </header>

    <section class="capture-result" role="status" aria-live="polite" aria-atomic="true">
      <div class="status-track" aria-hidden="true">
        <span class="status-node" id="statusIcon"></span>
      </div>
      <div class="capture-copy">
        <h1 id="statusTitle">正在保存</h1>
        <p class="status-body" id="statusBody" hidden></p>
        <div class="captured-page" id="capturedPage" hidden>
          <strong id="capturedTitle"></strong>
          <small id="capturedHost"></small>
        </div>
      </div>
    </section>

    <footer class="popup-footer">
      <span id="localNote">仅保存在本机</span>
      <button type="button" id="openDashboard">
        <span id="openDashboardLabel">打开</span>
        <span id="openDashboardIcon" aria-hidden="true"></span>
      </button>
    </footer>
  </main>
  <script type="module" src="assets/client/action-popup.mjs"></script>
</body>
</html>
